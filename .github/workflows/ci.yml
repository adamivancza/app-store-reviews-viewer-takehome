name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Build the Go 1.25 module with the current release used for
          # development.
          go-version: 1.26.x
          # The backend has no module dependencies and therefore no go.sum to
          # use as a cache key.
          cache: false
      - name: Test with race detection
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build -o /tmp/reviews-viewer ./cmd/server

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix web
      - name: Test with coverage
        run: npm --prefix web run test:coverage
      - name: Build
        run: npm --prefix web run build

  e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: e2e/requirements.txt
      - name: Install frontend dependencies
        run: npm ci --prefix web
      - name: Install Playwright
        run: |
          python3 -m pip install -r e2e/requirements.txt
          python3 -m playwright install --with-deps chromium
      - name: Run production browser test
        run: make test-e2e
